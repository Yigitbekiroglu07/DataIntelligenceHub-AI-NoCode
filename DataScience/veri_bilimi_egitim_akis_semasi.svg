<svg width="100%" viewBox="0 0 680 1340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Veri Bilimi Eğitimi — Akış Şeması</title>
  <desc>17 modülden oluşan veri bilimi eğitiminin adım adım akış şeması</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .phase-label { font-size: 12px; font-weight: 400; fill: #888780; }

      /* Purple nodes (modules 1-2) */
      .mod-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .mod-purple .th { fill: #3C3489; }
      .mod-purple .ts { fill: #534AB7; }

      /* Teal nodes (modules 3-6) */
      .mod-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .mod-teal .th { fill: #085041; }
      .mod-teal .ts { fill: #0F6E56; }

      /* Blue nodes (modules 8-11) */
      .mod-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .mod-blue .th { fill: #0C447C; }
      .mod-blue .ts { fill: #185FA5; }

      /* Coral nodes (modules 12-15) */
      .mod-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .mod-coral .th { fill: #712B13; }
      .mod-coral .ts { fill: #993C1D; }

      /* Amber nodes (ödevler) */
      .mod-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .mod-amber .th { fill: #633806; }
      .mod-amber .ts { fill: #854F0B; }

      .connector { fill: none; stroke: #B4B2A9; stroke-width: 1; }
      .arr-line { fill: none; stroke: #B4B2A9; stroke-width: 1; marker-end: url(#arrow); }
      .phase-rect { fill: none; stroke: #D3D1C7; stroke-width: 0.5; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <!-- PHASE BAND 1: Temel -->
  <rect class="phase-rect" x="40" y="30" width="600" height="200" rx="16"/>
  <text class="phase-label" x="57" y="50">Temel</text>

  <!-- Modül 1 -->
  <g class="mod-purple">
    <rect x="200" y="56" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="76" text-anchor="middle" dominant-baseline="central">1. Veri bilimine giriş</text>
    <text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central">Kavramlar · veri türleri · araçlar</text>
  </g>

  <line class="arr-line" x1="340" y1="112" x2="340" y2="138"/>

  <!-- Modül 2 -->
  <g class="mod-purple">
    <rect x="200" y="144" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="164" text-anchor="middle" dominant-baseline="central">2. Veri setini tanıma</text>
    <text class="ts" x="340" y="184" text-anchor="middle" dominant-baseline="central">Yükleme · inceleme · değişken tipleri</text>
  </g>

  <!-- PHASE BAND 2: Veri Temizleme -->
  <rect class="phase-rect" x="40" y="240" width="600" height="320" rx="16"/>
  <text class="phase-label" x="57" y="260">Veri temizleme</text>

  <line class="arr-line" x1="340" y1="200" x2="340" y2="268"/>

  <!-- Modül 3 -->
  <g class="mod-teal">
    <rect x="200" y="274" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="294" text-anchor="middle" dominant-baseline="central">3. Eksik veriler</text>
    <text class="ts" x="340" y="314" text-anchor="middle" dominant-baseline="central">Tespit · silme · ortalama/mod doldurma</text>
  </g>

  <line class="arr-line" x1="340" y1="330" x2="340" y2="356"/>

  <!-- Modül 4 -->
  <g class="mod-teal">
    <rect x="200" y="362" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="382" text-anchor="middle" dominant-baseline="central">4. Veri tipleri ve dönüşümler</text>
    <text class="ts" x="340" y="402" text-anchor="middle" dominant-baseline="central">String → sayı · tarih · yeni özellik</text>
  </g>

  <line class="arr-line" x1="340" y1="418" x2="340" y2="444"/>

  <!-- Modül 5 -->
  <g class="mod-teal">
    <rect x="200" y="450" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="470" text-anchor="middle" dominant-baseline="central">5. Tutarsız kayıtlar</text>
    <text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">Duplicate · mantıksal hatalar</text>
  </g>

  <line class="arr-line" x1="340" y1="506" x2="340" y2="532"/>

  <!-- Modül 6 -->
  <g class="mod-teal">
    <rect x="200" y="538" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="558" text-anchor="middle" dominant-baseline="central">6. Aykırı değerler</text>
    <text class="ts" x="340" y="578" text-anchor="middle" dominant-baseline="central">IQR · filtreleme · sınırlandırma</text>
  </g>

  <!-- ARA ÖDEV -->
  <line class="arr-line" x1="340" y1="594" x2="340" y2="628"/>

  <g class="mod-amber">
    <rect x="230" y="634" width="220" height="44" rx="22" stroke-width="0.5"/>
    <text class="th" x="340" y="656" text-anchor="middle" dominant-baseline="central">7. Ara ödev</text>
  </g>

  <!-- PHASE BAND 3: Analiz -->
  <rect class="phase-rect" x="40" y="710" width="600" height="380" rx="16"/>
  <text class="phase-label" x="57" y="730">Analiz</text>

  <line class="arr-line" x1="340" y1="678" x2="340" y2="742"/>

  <!-- Modül 8 -->
  <g class="mod-blue">
    <rect x="200" y="748" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="768" text-anchor="middle" dominant-baseline="central">8. Kategorik veri analizi</text>
    <text class="ts" x="340" y="788" text-anchor="middle" dominant-baseline="central">Frekans · dağılım · grafik</text>
  </g>

  <line class="arr-line" x1="340" y1="804" x2="340" y2="830"/>

  <!-- Modül 9 -->
  <g class="mod-blue">
    <rect x="200" y="836" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="856" text-anchor="middle" dominant-baseline="central">9. Sayısal veri analizi</text>
    <text class="ts" x="340" y="876" text-anchor="middle" dominant-baseline="central">İstatistik · histogram · yorum</text>
  </g>

  <line class="arr-line" x1="340" y1="892" x2="340" y2="918"/>

  <!-- Modül 10 -->
  <g class="mod-blue">
    <rect x="200" y="924" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="944" text-anchor="middle" dominant-baseline="central">10. Grup bazlı analiz</text>
    <text class="ts" x="340" y="964" text-anchor="middle" dominant-baseline="central">Kategori · şehir · zaman grupları</text>
  </g>

  <line class="arr-line" x1="340" y1="980" x2="340" y2="1006"/>

  <!-- Modül 11 -->
  <g class="mod-blue">
    <rect x="200" y="1012" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="1032" text-anchor="middle" dominant-baseline="central">11. Pivot tablolar</text>
    <text class="ts" x="340" y="1052" text-anchor="middle" dominant-baseline="central">İki değişkenli karşılaştırma</text>
  </g>

  <!-- PHASE BAND 4: Görselleştirme & Hikaye -->
  <rect class="phase-rect" x="40" y="1098" width="600" height="204" rx="16"/>
  <text class="phase-label" x="57" y="1118">Görselleştirme ve hikaye</text>

  <line class="arr-line" x1="340" y1="1068" x2="340" y2="1126"/>

  <!-- Modül 12 -->
  <g class="mod-coral">
    <rect x="200" y="1132" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="1152" text-anchor="middle" dominant-baseline="central">12. Veri görselleştirme</text>
    <text class="ts" x="340" y="1172" text-anchor="middle" dominant-baseline="central">Line · scatter · bar · box plot</text>
  </g>

  <!-- Branch to 13 and 15 -->
  <path class="connector" d="M 280 1188 L 139 1188 L 139 1220" marker-end="url(#arrow)"/>
  <path class="connector" d="M 400 1188 L 541 1188 L 541 1220" marker-end="url(#arrow)"/>
  <line class="arr-line" x1="340" y1="1188" x2="340" y2="1220"/>

  <!-- Modül 13 -->
  <g class="mod-coral">
    <rect x="52" y="1220" width="174" height="44" rx="10" stroke-width="0.5"/>
    <text class="th" x="139" y="1242" text-anchor="middle" dominant-baseline="central">13. Zaman analizi</text>
  </g>

  <!-- Modül 14 -->
  <g class="mod-coral">
    <rect x="253" y="1220" width="174" height="44" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="1242" text-anchor="middle" dominant-baseline="central">14. İlişki analizi</text>
  </g>

  <!-- Modül 15 -->
  <g class="mod-coral">
    <rect x="454" y="1220" width="174" height="44" rx="10" stroke-width="0.5"/>
    <text class="th" x="541" y="1242" text-anchor="middle" dominant-baseline="central">15. Hikayeleştirme</text>
  </g>

  <!-- Toplanma -->
  <line class="connector" x1="139" y1="1264" x2="139" y2="1286"/>
  <line class="connector" x1="541" y1="1264" x2="541" y2="1286"/>
  <line class="connector" x1="139" y1="1286" x2="541" y2="1286"/>
  <line class="arr-line" x1="340" y1="1286" x2="340" y2="1302"/>

  <!-- Final Ödev -->
  <g class="mod-amber">
    <rect x="230" y="1308" width="220" height="24" rx="12" stroke-width="0.5"/>
    <text class="ts" x="340" y="1320" text-anchor="middle" dominant-baseline="central">16. Final ödevi</text>
  </g>

</svg>
